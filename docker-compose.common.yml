x-shared-app-env: &shared-app-env
  DEFAULT_PROXY_ID: ${DEFAULT_PROXY_ID:-default}
  PROXY_MANAGEMENT_TOKEN: ${PROXY_MANAGEMENT_TOKEN:-change-me}
  ENABLE_TEST_MODE: ${ENABLE_TEST_MODE:-}
  WEB_WORKERS: ${WEB_WORKERS:-}
  WEB_THREADS: ${WEB_THREADS:-}
  WEB_TIMEOUT: ${WEB_TIMEOUT:-}
  WEB_GRACEFUL_TIMEOUT: ${WEB_GRACEFUL_TIMEOUT:-}
  WEB_KEEPALIVE: ${WEB_KEEPALIVE:-}
  DB_POOL_SIZE: ${DB_POOL_SIZE:-}
  DB_POOL_MAX_IDLE_SECONDS: ${DB_POOL_MAX_IDLE_SECONDS:-}
  DATABASE_URL: ${DATABASE_URL:-}
  MYSQL_HOST: ${MYSQL_HOST:-}
  MYSQL_PORT: ${MYSQL_PORT:-3306}
  MYSQL_USER: ${MYSQL_USER:-}
  MYSQL_PASSWORD: ${MYSQL_PASSWORD:-}
  MYSQL_DATABASE: ${MYSQL_DATABASE:-}
  MYSQL_CREATE_DATABASE: ${MYSQL_CREATE_DATABASE:-1}
  MYSQL_CONNECT_TIMEOUT: ${MYSQL_CONNECT_TIMEOUT:-}
  MYSQL_READ_TIMEOUT: ${MYSQL_READ_TIMEOUT:-}
  MYSQL_WRITE_TIMEOUT: ${MYSQL_WRITE_TIMEOUT:-}
  MYSQL_CONNECT_RETRIES: ${MYSQL_CONNECT_RETRIES:-}
  MYSQL_CONNECT_RETRY_DELAY_SECONDS: ${MYSQL_CONNECT_RETRY_DELAY_SECONDS:-}
  MYSQL_LOCK_WAIT_TIMEOUT: ${MYSQL_LOCK_WAIT_TIMEOUT:-}
  MYSQL_INNODB_LOCK_WAIT_TIMEOUT: ${MYSQL_INNODB_LOCK_WAIT_TIMEOUT:-}
  MYSQL_SESSION_WAIT_TIMEOUT: ${MYSQL_SESSION_WAIT_TIMEOUT:-}
  MYSQL_TRANSACTION_ISOLATION: ${MYSQL_TRANSACTION_ISOLATION:-}
  DB_POOL_ACQUIRE_TIMEOUT_SECONDS: ${DB_POOL_ACQUIRE_TIMEOUT_SECONDS:-}
  PROXY_HEALTH_UI_TIMEOUT_SECONDS: ${PROXY_HEALTH_UI_TIMEOUT_SECONDS:-}
  PROXY_CLAMAV_HEALTH_UI_TIMEOUT_SECONDS: ${PROXY_CLAMAV_HEALTH_UI_TIMEOUT_SECONDS:-}
  PROXY_HEALTH_UI_CACHE_TTL_SECONDS: ${PROXY_HEALTH_UI_CACHE_TTL_SECONDS:-}
  PROXY_OBSERVABILITY_UI_CACHE_TTL_SECONDS: ${PROXY_OBSERVABILITY_UI_CACHE_TTL_SECONDS:-}
  PROXY_HEALTH_CACHE_TTL_SECONDS: ${PROXY_HEALTH_CACHE_TTL_SECONDS:-}
  PROXY_CLAMAV_HEALTH_PROBE_TIMEOUT_SECONDS: ${PROXY_CLAMAV_HEALTH_PROBE_TIMEOUT_SECONDS:-}
  STATS_CACHE_DIR_SIZE_TTL_SECONDS: ${STATS_CACHE_DIR_SIZE_TTL_SECONDS:-}

services:
  admin-ui:
    restart: unless-stopped
    logging:
      driver: ${DOCKER_LOG_DRIVER:-json-file}
      options:
        max-size: ${DOCKER_LOG_MAX_SIZE:-10m}
        max-file: ${DOCKER_LOG_MAX_FILE:-3}
    ports:
      - "0.0.0.0:5000:5000"       # Flask UI
    volumes:
      - ./squid/squid.conf.template:/etc/squid/squid.conf.template:ro
      - ./squid/ssl/certs:/etc/squid/ssl/certs
    environment:
      <<: *shared-app-env
      DISABLE_BACKGROUND: 0
      ADMIN_UI_HTTPS_ENABLED: ${ADMIN_UI_HTTPS_ENABLED:-0}
      ADMIN_UI_SSL_CERTFILE: ${ADMIN_UI_SSL_CERTFILE:-}
      ADMIN_UI_SSL_KEYFILE: ${ADMIN_UI_SSL_KEYFILE:-}
    healthcheck:
      test: ["CMD", "/healthcheck.admin.sh"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - control

  proxy:
    restart: unless-stopped
    logging:
      driver: ${DOCKER_LOG_DRIVER:-json-file}
      options:
        max-size: ${DOCKER_LOG_MAX_SIZE:-10m}
        max-file: ${DOCKER_LOG_MAX_FILE:-3}
    shm_size: ${PROXY_SHM_SIZE:-512m}
    sysctls:
      net.ipv6.conf.all.disable_ipv6: ${DISABLE_IPV6:-1}
      net.ipv6.conf.default.disable_ipv6: ${DISABLE_IPV6:-1}
      net.ipv6.conf.lo.disable_ipv6: ${DISABLE_IPV6:-1}
    ports:
      - "0.0.0.0:80:80"           # Proxy public health + WPAD/PAC listener
      - "0.0.0.0:3128:3128"       # HTTP proxy
      - "0.0.0.0:${PROXY_PUBLIC_INTERCEPT_PORT:-3129}:${SQUID_INTERCEPT_PORT:-3129}" # HTTP NAT intercept listener (optional)
      - "0.0.0.0:${PROXY_PUBLIC_HTTPS_INTERCEPT_PORT:-3130}:${SQUID_HTTPS_INTERCEPT_PORT:-3130}" # HTTPS NAT intercept listener (optional)
    volumes:
      - ./squid/squid.conf.template:/etc/squid/squid.conf.template:ro
      - ./squid/ssl/certs:/etc/squid/ssl/certs
      - squid_logs:/var/log/squid
      - squid_ssl_db:/var/lib/ssl_db
      - squid_cache:/var/spool/squid
      - proxy_data:/var/lib/squid-flask-proxy
    environment:
      <<: *shared-app-env
      PROXY_INSTANCE_ID: ${PROXY_INSTANCE_ID:-default}
      PROXY_DISPLAY_NAME: ${PROXY_DISPLAY_NAME:-Default Proxy}
      PROXY_MANAGEMENT_URL: ${PROXY_MANAGEMENT_URL:-}
      PROXY_MANAGEMENT_HOST: ${PROXY_MANAGEMENT_HOST:-}
      PROXY_MANAGEMENT_SCHEME: ${PROXY_MANAGEMENT_SCHEME:-}
      PROXY_MANAGEMENT_PORT: ${PROXY_MANAGEMENT_PORT:-}
      PROXY_PUBLIC_HOST: ${PROXY_PUBLIC_HOST:-}
      PROXY_PUBLIC_PAC_URL: ${PROXY_PUBLIC_PAC_URL:-}
      PROXY_PUBLIC_PAC_SCHEME: ${PROXY_PUBLIC_PAC_SCHEME:-http}
      PROXY_PUBLIC_PAC_PORT: ${PROXY_PUBLIC_PAC_PORT:-80}
      PAC_HTTP_HOST: ${PAC_HTTP_HOST:-0.0.0.0}
      PAC_HTTP_PORT: ${PAC_HTTP_PORT:-80}
      FORWARDING_CANARY_HOST: ${FORWARDING_CANARY_HOST:-127.0.0.1}
      FORWARDING_CANARY_PORT: ${FORWARDING_CANARY_PORT:-18080}
      FORWARDING_CANARY_PATH: ${FORWARDING_CANARY_PATH:-/__docker_proxy_forwarding_canary}
      PROXY_PUBLIC_HTTP_PROXY_PORT: ${PROXY_PUBLIC_HTTP_PROXY_PORT:-3128}
      PAC_TRUSTED_PROXY_CIDRS: ${PAC_TRUSTED_PROXY_CIDRS:-}
      SQUID_HTTP_PORT: ${SQUID_HTTP_PORT:-}
      SQUID_INTERCEPT_ENABLED: ${SQUID_INTERCEPT_ENABLED:-}
      SQUID_INTERCEPT_PORT: ${SQUID_INTERCEPT_PORT:-}
      SQUID_HTTPS_INTERCEPT_ENABLED: ${SQUID_HTTPS_INTERCEPT_ENABLED:-}
      SQUID_HTTPS_INTERCEPT_PORT: ${SQUID_HTTPS_INTERCEPT_PORT:-}
      SQUID_HTTPS_INTERCEPT_SPLICE_ONLY: ${SQUID_HTTPS_INTERCEPT_SPLICE_ONLY:-}
      DISABLE_IPV6: ${DISABLE_IPV6:-1}
      SQUID_WORKERS: ${SQUID_WORKERS:-}
      SQUID_CACHE_MEM_MB: ${SQUID_CACHE_MEM_MB:-}
      SQUID_SSLCRTD_CHILDREN: ${SQUID_SSLCRTD_CHILDREN:-}
      SQUID_DYNAMIC_CERT_MEM_CACHE_MB: ${SQUID_DYNAMIC_CERT_MEM_CACHE_MB:-}
      SQUID_MAX_FILEDESCRIPTORS: ${SQUID_MAX_FILEDESCRIPTORS:-}
      CICAP_PORT: ${CICAP_PORT:-14000}
      CICAP_AV_PORT: ${CICAP_AV_PORT:-14001}
      CICAP_AV_RESP_PORT: ${CICAP_AV_RESP_PORT:-}
      ADBLOCK_CACHE_TTL: ${ADBLOCK_CACHE_TTL:-}
      ADBLOCK_CACHE_MAX: ${ADBLOCK_CACHE_MAX:-}
      ADBLOCK_RULE_CACHE_MAX: ${ADBLOCK_RULE_CACHE_MAX:-}
      ADBLOCK_ICAP_MAX_REQUEST_BYTES: ${ADBLOCK_ICAP_MAX_REQUEST_BYTES:-}
      ADBLOCK_ICAP_MAX_BODY_DRAIN_BYTES: ${ADBLOCK_ICAP_MAX_BODY_DRAIN_BYTES:-}
      ADBLOCK_ICAP_REQUEST_TIMEOUT: ${ADBLOCK_ICAP_REQUEST_TIMEOUT:-}
      ADBLOCK_ICAP_MAX_KEEPALIVE_REQUESTS: ${ADBLOCK_ICAP_MAX_KEEPALIVE_REQUESTS:-}
      CLAMD_HOST: ${CLAMD_HOST:-127.0.0.1}
      CLAMD_PORT: ${CLAMD_PORT:-3310}
      CLAMAV_REQUIRED: ${CLAMAV_REQUIRED:-0}
      FILE_SECURITY_AV_REQUIRED: ${FILE_SECURITY_AV_REQUIRED:-}
      ULIMIT_NOFILE: ${ULIMIT_NOFILE:-}
      WEBFILTER_HELPERS: ${WEBFILTER_HELPERS:-}
      LIVE_STATS_COMMIT_BATCH: ${LIVE_STATS_COMMIT_BATCH:-}
      LIVE_STATS_COMMIT_INTERVAL_SECONDS: ${LIVE_STATS_COMMIT_INTERVAL_SECONDS:-}
      LIVE_STATS_POLL_INTERVAL_SECONDS: ${LIVE_STATS_POLL_INTERVAL_SECONDS:-}
      LIVE_STATS_MAX_PENDING_ROWS: ${LIVE_STATS_MAX_PENDING_ROWS:-}
      LIVE_STATS_DB_WRITE_BACKOFF_INITIAL_SECONDS: ${LIVE_STATS_DB_WRITE_BACKOFF_INITIAL_SECONDS:-}
      LIVE_STATS_DB_WRITE_BACKOFF_MAX_SECONDS: ${LIVE_STATS_DB_WRITE_BACKOFF_MAX_SECONDS:-}
      LIVE_STATS_DB_WRITE_BACKOFF_JITTER_RATIO: ${LIVE_STATS_DB_WRITE_BACKOFF_JITTER_RATIO:-}
      DIAGNOSTIC_COMMIT_BATCH: ${DIAGNOSTIC_COMMIT_BATCH:-}
      DIAGNOSTIC_COMMIT_INTERVAL_SECONDS: ${DIAGNOSTIC_COMMIT_INTERVAL_SECONDS:-}
      DIAGNOSTIC_POLL_INTERVAL_SECONDS: ${DIAGNOSTIC_POLL_INTERVAL_SECONDS:-}
      DIAGNOSTIC_PENDING_MAX_ROWS: ${DIAGNOSTIC_PENDING_MAX_ROWS:-}
      DIAGNOSTIC_DB_WRITE_BACKOFF_INITIAL_SECONDS: ${DIAGNOSTIC_DB_WRITE_BACKOFF_INITIAL_SECONDS:-}
      DIAGNOSTIC_DB_WRITE_BACKOFF_MAX_SECONDS: ${DIAGNOSTIC_DB_WRITE_BACKOFF_MAX_SECONDS:-}
      DIAGNOSTIC_DB_WRITE_BACKOFF_JITTER_RATIO: ${DIAGNOSTIC_DB_WRITE_BACKOFF_JITTER_RATIO:-}
      TIMESERIES_ROLLUP_INTERVAL_SECONDS: ${TIMESERIES_ROLLUP_INTERVAL_SECONDS:-}
      TIMESERIES_STARTUP_JITTER_SECONDS: ${TIMESERIES_STARTUP_JITTER_SECONDS:-}
      TIMESERIES_SAMPLE_DB_BACKOFF_INITIAL_SECONDS: ${TIMESERIES_SAMPLE_DB_BACKOFF_INITIAL_SECONDS:-}
      TIMESERIES_SAMPLE_DB_BACKOFF_MAX_SECONDS: ${TIMESERIES_SAMPLE_DB_BACKOFF_MAX_SECONDS:-}
      TIMESERIES_SAMPLE_DB_BACKOFF_JITTER_RATIO: ${TIMESERIES_SAMPLE_DB_BACKOFF_JITTER_RATIO:-}
      TIMESERIES_ROLLUP_DB_BACKOFF_INITIAL_SECONDS: ${TIMESERIES_ROLLUP_DB_BACKOFF_INITIAL_SECONDS:-}
      TIMESERIES_ROLLUP_DB_BACKOFF_MAX_SECONDS: ${TIMESERIES_ROLLUP_DB_BACKOFF_MAX_SECONDS:-}
      TIMESERIES_ROLLUP_DB_BACKOFF_JITTER_RATIO: ${TIMESERIES_ROLLUP_DB_BACKOFF_JITTER_RATIO:-}
      SSL_ERRORS_COMMIT_BATCH: ${SSL_ERRORS_COMMIT_BATCH:-}
      SSL_ERRORS_COMMIT_INTERVAL_SECONDS: ${SSL_ERRORS_COMMIT_INTERVAL_SECONDS:-}
      SSL_ERRORS_POLL_INTERVAL_SECONDS: ${SSL_ERRORS_POLL_INTERVAL_SECONDS:-}
      PROXY_HEARTBEAT_INTERVAL_SECONDS: ${PROXY_HEARTBEAT_INTERVAL_SECONDS:-}
      PROXY_SYNC_INTERVAL_SECONDS: ${PROXY_SYNC_INTERVAL_SECONDS:-}
    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    networks:
      control:
        aliases:
          - proxy
          - ${PROXY_INSTANCE_ID:-proxy}
