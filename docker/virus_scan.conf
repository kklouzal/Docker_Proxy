# c-icap virus_scan configuration for squid-flask-proxy
# Loaded by /etc/c-icap/c-icap.conf

# Keep scanning focused.
# Note: this c-icap-modules build only recognizes a limited set of data types.
virus_scan.ScanFileTypes TEXT DATA BINARY


# Stream partial content to the browser while scanning continues in the
# background.  Without early-send, downloads appear stalled at 0 KB/s until
# the entire file is received and scanned.
#
# StartSendPercentDataAfter: once this many bytes have been received from the
#   origin, begin releasing data to the client.  Keep this small so browsers
#   show progress almost immediately.  The file is still fully scanned; the
#   scan just runs concurrently with delivery.
# SendPercentData: percentage of already-received data that may be sent to the
#   client ahead of the scan completing.  Higher = more responsive downloads.
#   At 0 the entire file is held until the scan finishes (worst UX).
#   At 100 the client receives data as fast as the origin sends it.
virus_scan.SendPercentData 95
virus_scan.StartSendPercentDataAfter 2M

# Fail-open on scanner/service errors (browsing continues)
virus_scan.PassOnError on

# Allow 204 responses (Squid supports it)
virus_scan.Allow204Responces on

# Max object size to scan
virus_scan.MaxObjectSize 128M

# Select the default engine.
# NOTE: clamd_mod only registers its engine after it can connect to the clamd socket.
# For immediate c-icap startup, avoid forcing an engine name here; virus_scan will
# pick the first available engine once registered.
# virus_scan.DefaultEngine clamd
