name: Publish Docker images to GHCR

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  DOCKER_BUILD_RECORD_RETENTION_DAYS: 7

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            web/requirements.txt
            web/requirements-dev.txt

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r web/requirements-dev.txt

      - name: Run Ruff lint
        run: >-
          python -m ruff check
          --select E,F,I,UP,COM
          --ignore E501,COM812
          --output-format=github
          proxy web/app.py web/services web/tools web/wsgi.py

  deterministic-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: ruff-check
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            web/requirements.txt
            web/requirements-dev.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r web/requirements-dev.txt

      - name: Run deterministic tests
        run: >-
          python -m pytest -m "not live" -p no:cacheprovider
          --durations=10
          -ra
          web/tests

  build-test-images:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: deterministic-tests
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: admin-ui
            dockerfile: docker/Dockerfile.admin
          - image: proxy
            dockerfile: docker/Dockerfile.proxy
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build local test image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          load: true
          tags: docker-proxy-${{ matrix.image }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  live-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: build-test-images
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build live-test stack
        run: docker compose -f docker-compose.yml -f docker-compose.live-tests.yml build

      - name: Run live tests
        run: >-
          docker compose -f docker-compose.yml -f docker-compose.live-tests.yml
          up --abort-on-container-exit --exit-code-from live-tests live-tests

      - name: Dump live-test logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.live-tests.yml logs --no-color

      - name: Tear down live-test stack
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.live-tests.yml down -v --remove-orphans

  publish-images:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: live-tests
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: admin-ui
            dockerfile: docker/Dockerfile.admin
          - image: proxy
            dockerfile: docker/Dockerfile.proxy

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          pull: true
          sbom: true
          provenance: mode=max
          cache-from: type=gha
          cache-to: type=gha,mode=max
