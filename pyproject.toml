[tool.ruff]
target-version = "py312"
line-length = 88
extend-exclude = [
    ".venv",
    ".ruff_cache",
]

[tool.ruff.lint]
preview = true
select = ["ALL"]
ignore = [
    # Ownership/legal boilerplate is not a useful proxy quality gate.
    "CPY001",

    # Enforce behavior and maintainability, not boilerplate documentation churn.
    "D100",
    "D101",
    "D102",
    "D103",
    "D104",
    "D105",
    "D107",
    "DOC201",
    "DOC501",

    # Duplicate pydocstyle opinions; keep the compatible counterparts enabled.
    "D203",
    "D213",

    # Ruff format owns wrapping; residual long lines are usually literals,
    # command snippets, generated messages, URLs, or SQL fragments.
    "E501",

    # Avoid churning cohesive service APIs into staticmethod-heavy classes.
    "PLR6301",

    # Keep formatter-only style out of the blocking lint gate.
    "COM812",
    "ISC001",
    "Q000",
    "Q001",
    "Q002",
    "Q003",
    "Q004",
]

[tool.ruff.lint.per-file-ignores]
# Pytest asserts are idiomatic. Tests also need concise scenario functions,
# literal expected values, private API probes, isolated imports/reloads, fixture
# arguments, and monkeypatch-compatible call signatures.
# Keep pytest, security, exception, pathlib, and complexity checks active.
"web/tests/**/*.py" = [
    "ANN001",
    "ANN002",
    "ANN003",
    "ANN201",
    "ANN202",
    "ANN204",
    "ANN401",
    "ARG001",
    "ARG002",
    "ARG005",
    "PGH003",
    "PLC0415",
    "PLR2004",
    "S101",
    "SLF001",
]
